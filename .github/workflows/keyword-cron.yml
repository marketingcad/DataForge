name: Auto Keyword Scraper Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  trigger-cron:
    name: Trigger keyword scrape cron
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call scraping cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "ERROR: APP_URL secret is not set" >&2
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "ERROR: CRON_SECRET secret is not set" >&2
            exit 1
          fi

          echo "Calling: ${APP_URL}/api/scraping/cron"

          HTTP_STATUS=$(curl -s -o /tmp/cron_response.txt -w "%{http_code}" \
            -X GET "${APP_URL}/api/scraping/cron" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --max-time 30 || echo "000")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $(cat /tmp/cron_response.txt)"

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "204" ]; then
            echo "Cron triggered successfully"
          else
            echo "Cron returned HTTP $HTTP_STATUS" >&2
            exit 1
          fi
